{% extends "base.html" %}

{% block title %}Редактирование товара #{{ product.id }} - Web Market{% endblock %}

{% block content %}
<h1 style="margin-bottom: 2rem;">Редактирование товара #{{ product.id }}</h1>

<div class="card" style="max-width: 800px; margin: 0 auto;">
    <form method="POST" action="{{ url_for('admin_edit_product', product_id=product.id) }}" enctype="multipart/form-data">
        <div class="form-group">
            <label for="name">Название</label>
            <input type="text" id="name" name="name" class="form-control" value="{{ product.name }}" />
        </div>

        <div class="form-group">
            <label for="description">Описание</label>
            <textarea id="description" name="description" class="form-control" rows="5">{{ product.description or '' }}</textarea>
        </div>

        <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 180px;">
                <div class="form-group">
                    <label for="price">Цена</label>
                    <input type="number" step="0.01" id="price" name="price" class="form-control" value="{{ product.price }}" />
                </div>
            </div>

            <div style="flex: 1; min-width: 180px;">
                <div class="form-group">
                    <label for="stock">Склад</label>
                    <input type="number" id="stock" name="stock" class="form-control" value="{{ product.stock }}" />
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="image">Новая картинка товара (PNG)</label>
            <input type="file" id="image" name="image" class="form-control" accept=".png,image/png" />
        </div>

        <div style="display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1.5rem;">
            <button type="submit" class="btn">Сохранить</button>
            <a href="{{ url_for('admin_products') }}" class="btn btn-secondary">
                ← Назад
            </a>
        </div>
    </form>
</div>
{% endblock %}
