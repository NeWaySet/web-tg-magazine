{% extends "base.html" %}

{% block title %}Регистрация - Web Market{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 2rem auto;">
    <h2 style="text-align: center; margin-bottom: 1.5rem;">Регистрация</h2>
    
    <form method="POST">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" class="form-control" required autofocus>
        </div>
        
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" class="form-control" required minlength="6">
            <small style="color: #666;">Минимум 6 символов</small>
        </div>
        
        <div class="form-group">
            <label for="confirm_password">Подтверждение пароля</label>
            <input type="password" id="confirm_password" name="confirm_password" class="form-control" required minlength="6">
        </div>
        
        <button type="submit" class="btn" style="width: 100%;">Зарегистрироваться</button>
    </form>
    
    <p style="margin-top: 1rem; text-align: center; color: #666;">
        Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a>
    </p>
</div>
{% endblock %}
