{% extends "base.html" %}

{% block title %}500 - Ошибка сервера{% endblock %}

{% block content %}
<div class="card" style="text-align: center; padding: 3rem; max-width: 600px; margin: 3rem auto;">
    <h1 style="font-size: 4rem; color: #e74c3c; margin-bottom: 1rem;">500</h1>
    <h2 style="color: #333; margin-bottom: 1.5rem;">Ошибка сервера</h2>

    <p style="color: #666; font-size: 1.1rem; line-height: 1.8; margin-bottom: 2rem;">
        {{ message }}
    </p>

    <div style="margin-top: 2rem;">
        <a href="{{ url_for('index') }}" class="btn" style="margin-right: 1rem;">
            На главную
        </a>
        <a href="{{ url_for('catalog') }}" class="btn btn-secondary">
            Каталог товаров
        </a>
    </div>
</div>
{% endblock %}
